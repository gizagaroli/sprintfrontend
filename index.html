<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/home.css">

    <title>Home</title>
</head>

<body>

<div class="app-screen home-page">

    <header class="home-header">

        <div class="status-bar">
            <span>9:41</span>

            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="home-header-top">

            <!-- PERFIL -->
            <a href="pages/perfil.html" class="profile-access" aria-label="Acessar perfil">
                <img src="assets/images/global/avatars/avatar2.png" class="profile-avatar" alt="Perfil">
                <span class="profile-text">Meu perfil</span>
            </a>

            <div class="header-actions">
                <div class="notification">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notification-dot"></span>
                </div>

                <i class="fa-solid fa-bars menu-icon"></i>
            </div>

        </div>

        <h1>Olá, Renata</h1>

    </header>

    <main class="home-content">

        <section class="quick-access">

            <h2>Acesso rápido</h2>

            <div class="quick-scroll">

                <button class="quick-card">
                    <i class="fa-regular fa-credit-card"></i>
                    <span>Carteirinha</span>
                </button>

                <button class="quick-card">
                    <i class="fa-regular fa-calendar"></i>
                    <span>Agendar</span>
                </button>

                <button class="quick-card">
                    <i class="fa-regular fa-comment"></i>
                    <span>Telemedicina</span>
                </button>

            </div>

        </section>

        <section class="carefit-banner">

            <img src="assets/images/global/bgbanner.png" class="carefit-bg" alt="Banner Care Fit">

            <div class="carefit-content">

                <img src="assets/images/global/logos/carefit.png" class="carefit-logo" alt="Care Fit">

                <p>Que tal tornar o cuidado com a sua saúde mais divertido?</p>

                <a href="pages/beneficios.html">
                    Acessar
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

            </div>

        </section>

        <section class="posts-section">

            <span>ÚLTIMAS PUBLICAÇÕES</span>

            <h2>Fique por dentro dos conteúdos mais recentes</h2>

            <div class="post-card">
                <img src="../assets/images/local/exgrupo.jpg" alt="Publicação recente">
            </div>

        </section>

    </main>

</div>

</body>
</html>
