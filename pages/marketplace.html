<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/marketplace.css">
</head>

<body>

<div class="app-screen marketplace-page">

    <header class="marketplace-header">
        <img src="../assets/images/global/bgbanner.png" class="marketplace-header-bg" alt="">

        <div class="marketplace-status">
            <span>9:41</span>

            <div class="marketplace-status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-three-quarters"></i>
            </div>
        </div>

        <div class="marketplace-header-row">
            <a href="coins.html" class="marketplace-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </a>

            <img src="../assets/images/global/logos/carefit.png" class="marketplace-logo" alt="Care Fit">

            <div class="marketplace-balance">
                <span>1340</span>
                <img src="../assets/images/global/moeda.png" alt="Moeda">
            </div>
        </div>
    </header>

    <main class="marketplace-content">

        <label class="marketplace-search" for="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="search" type="text" placeholder="Pesquisar">
        </label>

        <section class="featured-product">
            <div class="featured-info">
                <div class="featured-price">
                    <img src="../assets/images/global/moeda.png" alt="Moeda">
                    <strong>149</strong>
                </div>

                <div class="featured-text">
                    <h2>Sem fio</h2>
                    <p>Cancelamento de ruído</p>
                </div>
            </div>

            <img src="../assets/images/global/produtos/fone.png" class="featured-image" alt="Fone sem fio">
        </section>

        <section class="marketplace-section">
            <h2 class="marketplace-title">ESPECIAIS</h2>

            <div class="specials-row">

                <article class="special-card">
                    <div class="special-img-box">
                        <img src="../assets/images/global/produtos/relogio.png" alt="Sport Band">
                    </div>

                    <div class="special-info">
                        <h3>Sport Band</h3>

                        <div class="product-meta">
                            <span>
                                <img src="../assets/images/global/moeda.png" alt="Moeda">
                                3559
                            </span>

                            <button type="button">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </article>

                <article class="special-card">
                    <div class="special-img-box">
                        <img src="../assets/images/global/produtos/headset.png" alt="Headphone">
                    </div>

                    <div class="special-info">
                        <h3>Headphone</h3>

                        <div class="product-meta">
                            <span>
                                <img src="../assets/images/global/moeda.png" alt="Moeda">
                                1559
                            </span>

                            <button type="button">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </article>

                <article class="special-card">
                    <div class="special-img-box">
                        <img src="../assets/images/global/produtos/celular.jpg" alt="Celular">
                    </div>

                    <div class="special-info">
                        <h3>Celular</h3>

                        <div class="product-meta">
                            <span>
                                <img src="../assets/images/global/moeda.png" alt="Moeda">
                                20250
                            </span>

                            <button type="button">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </article>

            </div>
        </section>

        <section class="marketplace-section">
            <h2 class="marketplace-title">TODOS</h2>

            <article class="list-product">
                <img src="../assets/images/global/produtos/headset2.png" alt="Snopy Headphone">

                <div class="list-product-info">
                    <h3>Snopy Headphone</h3>
                    <p>Snopy SN-BT96 Preto com bluetooth e bateria de 24h</p>

                    <span>
                        <img src="../assets/images/global/moeda.png" alt="Moeda">
                        6559
                    </span>
                </div>

                <button type="button" class="list-fav">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </article>
        </section>

    </main>

</div>

</body>

</html>
