<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/marketplace.css">
</head>

<body>

<div class="app-screen marketplace-page">

    <header class="marketplace-top">
        <div class="marketplace-header-row">
            <a href="coins.html" class="marketplace-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </a>

            <div class="marketplace-heading-text">
                <h1>Mercado</h1>
                <p>Troque suas coins por produtos incríveis.</p>
            </div>

            <div class="marketplace-balance">
                <img src="../assets/images/global/moeda.png" alt="Moeda">
                <span>1340</span>
            </div>
        </div>
    </header>

    <main class="marketplace-content">

        <label class="marketplace-search" for="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="search" type="text" placeholder="Pesquisar produtos...">

            <button type="button" aria-label="Filtros">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </label>

        <div class="category-row">
            <button type="button" class="active">Todos</button>
            <button type="button">Eletrônicos</button>
            <button type="button">Acessórios</button>
            <button type="button">Fitness</button>
        </div>

        <section class="featured-product">
            <div class="featured-info">
                <span class="featured-label">OFERTA DO DIA</span>

                <h2>Sony Headphone</h2>

                <div class="featured-price">
                    <strong>149</strong>
                    <img src="../assets/images/global/moeda.png" alt="Moeda">
                </div>

                <span class="featured-time">
                    <i class="fa-regular fa-clock"></i>
                    Por tempo limitado!
                </span>
            </div>

            <div class="featured-discount">
                85%<br>OFF
            </div>

            <img src="../assets/images/global/produtos/fone.png" class="featured-image" alt="Fone sem fio">
        </section>

        <section class="marketplace-section">
            <div class="section-header">
                <h2>Especiais</h2>
                <a href="#">Ver todos</a>
            </div>

            <div class="specials-row">

                <article class="special-card">
                    <button type="button" class="fav-btn">
                        <i class="fa-regular fa-heart"></i>
                    </button>

                    <img src="../assets/images/global/produtos/relogio.png" alt="Sport Band">

                    <div class="special-info">
                        <h3>Sport Band</h3>

                        <span>
                            <img src="../assets/images/global/moeda.png" alt="Moeda">
                            3559
                        </span>
                    </div>
                </article>

                <article class="special-card">
                    <button type="button" class="fav-btn">
                        <i class="fa-regular fa-heart"></i>
                    </button>

                    <img src="../assets/images/global/produtos/headset.png" alt="Headphone">

                    <div class="special-info">
                        <h3>Headphone</h3>

                        <span>
                            <img src="../assets/images/global/moeda.png" alt="Moeda">
                            1559
                        </span>
                    </div>
                </article>

                <article class="special-card">
                    <button type="button" class="fav-btn">
                        <i class="fa-regular fa-heart"></i>
                    </button>

                    <img src="../assets/images/global/produtos/celular.jpg" alt="Celular">

                    <div class="special-info">
                        <h3>Celular</h3>

                        <span>
                            <img src="../assets/images/global/moeda.png" alt="Moeda">
                            20250
                        </span>
                    </div>
                </article>

            </div>
        </section>

        <section class="marketplace-section">
            <div class="section-header">
                <h2>Todos os produtos</h2>
                <a href="#">Ver todos</a>
            </div>

            <div class="products-list">

                <article class="product-card">
                    <img src="../assets/images/global/produtos/headset2.png" alt="Snopy Headphone">

                    <div class="product-info">
                        <h3>Snopy Headphone</h3>

                        <span>
                            <img src="../assets/images/global/moeda.png" alt="Moeda">
                            6559
                        </span>
                    </div>

                    <button type="button" class="fav-btn">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                </article>

                <article class="product-card">
                    <img src="../assets/images/global/produtos/relogio.png" alt="Smartwatch Pro">

                    <div class="product-info">
                        <h3>Smartwatch Pro</h3>

                        <span>
                            <img src="../assets/images/global/moeda.png" alt="Moeda">
                            8899
                        </span>
                    </div>

                    <button type="button" class="fav-btn">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                </article>

            </div>
        </section>

    </main>

</div>

</body>

</html>
