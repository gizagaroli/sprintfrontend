<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- GLOBAL + PAGE -->
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/coins.css">

  <title>Coins</title>
</head>

<body>

    <div class="app-screen coins-page">

    <!-- HEADER -->
    <header class="coins-header">
        <a href="desafio.html" class="back-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
    </header>

    <!-- FUNDO -->
    <div class="coins-bg"></div>

    <!-- CONTEÚDO -->
    <main class="coins-content">

        <section class="hero-section">

            <img
                src="../assets/images/global/moeda.png"
                class="coin-img"
                alt="Moeda">

            <h1 class="coins-value">1340</h1>

            <span class="coins-subtitle">
                Care Coins disponíveis
            </span>

        </section>

        <section class="coins-panel">

            <!-- GANHOS E GASTOS -->

            <div class="stats-grid">

                <div class="stat-card">

                    <div class="stat-icon">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                    </div>

                    <div>
                        <span>Ganhos</span>
                        <strong>5400</strong>
                        <small>Care Coins</small>
                    </div>

                </div>

                <div class="stat-card">

                    <div class="stat-icon">
                        <i class="fa-solid fa-arrow-trend-down"></i>
                    </div>

                    <div>
                        <span>Gastos</span>
                        <strong>4060</strong>
                        <small>Care Coins</small>
                    </div>

                </div>

            </div>

            <!-- INFO -->

            <div class="info-card">

                <div class="info-circle">
                    <i class="fa-solid fa-circle-info"></i>
                </div>

                <div>

                    <h3>Como ganhar moedas?</h3>

                    <p>
                        Complete metas, participe de desafios,
                        atualize hábitos e convide amigos para
                        ganhar Care Coins.
                    </p>

                </div>

            </div>

            <!-- MARKETPLACE -->

            <a href="marketplace.html" class="marketplace-card">

                <div class="marketplace-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>

                <div class="marketplace-text">

                    <h3>Trocar por produtos</h3>

                    <span>
                        Veja as recompensas disponíveis
                    </span>

                </div>

                <i class="fa-solid fa-chevron-right"></i>

            </a>

        </section>

    </main>

</div>

</body>
</html>
