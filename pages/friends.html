<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/friends.css">

    <title>Care Friends</title>
</head>

<body>

    <div class="app-screen friends-page">

        <header class="friends-header">

            <a href="permissao.html" class="back-btn" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
        </header>

        <main class="friends-content">

            <img src="../assets/images/global/logos/carefriends.png" class="friends-logo" alt="Care Friends">

            <section class="avatars-network">

                <div class="avatar center">
                    <img src="../assets/images/global/avatars/avatar2.png" alt="Avatar principal">
                </div>

                <div class="avatar a1"><img src="../assets/images/global/avatars/avatar1.png" alt="Avatar 1"></div>
                <div class="avatar a2"><img src="../assets/images/global/avatars/avatar3.png" alt="Avatar 3"></div>
                <div class="avatar a3"><img src="../assets/images/global/avatars/avatar4.png" alt="Avatar 4"></div>
                <div class="avatar a4"><img src="../assets/images/global/avatars/avatar5.png" alt="Avatar 5"></div>
                <div class="avatar a5"><img src="../assets/images/global/avatars/avatar6.png" alt="Avatar 6"></div>
                <div class="avatar a6"><img src="../assets/images/global/avatars/avatar7.png" alt="Avatar 7"></div>
                <div class="avatar a7"><img src="../assets/images/global/avatars/avatar8.png" alt="Avatar 8"></div>
                <div class="avatar a8"><img src="../assets/images/global/avatars/avatar9.png" alt="Avatar 9"></div>

            </section>

            <p class="friends-text">
                Conecte com seus familiares e amigos e participe de desafios saudáveis.
                Compartilhe seu progresso e acompanhe a evolução.
            </p>

            <section class="invite-card">

                <div class="invite-top">

                    <div>
                        <span class="invite-label">Convite recebido</span>
                        <h2>Tá pago - Sales Team</h2>
                    </div>

                    <span class="invite-badge">NOVO</span>

                </div>

                <div class="mini-avatars">
                    <img src="../assets/images/global/avatars/avatar1.png" alt="">
                    <img src="../assets/images/global/avatars/avatar2.png" alt="">
                    <img src="../assets/images/global/avatars/avatar3.png" alt="">
                    <img src="../assets/images/global/avatars/avatar4.png" alt="">
                    <img src="../assets/images/global/avatars/avatar5.png" alt="">
                    <span class="more">+35</span>
                </div>

                <div class="group-activity">

                    <h3>Atividade recente</h3>

                    <div class="activity-item">
                        <img src="../assets/images/global/avatars/avatar1.png" alt="">
                        <div>
                            <strong>Ana</strong>
                            <span>completou um desafio</span>
                        </div>
                        <small>2h</small>
                    </div>

                    <div class="activity-item">
                        <img src="../assets/images/global/avatars/avatar4.png" alt="">
                        <div>
                            <strong>Pedro</strong>
                            <span>7 dias seguidos</span>
                        </div>
                        <small>5h</small>
                    </div>

                    <div class="activity-item">
                        <img src="../assets/images/global/avatars/avatar5.png" alt="">
                        <div>
                            <strong>Maria</strong>
                            <span>entrou no grupo</span>
                        </div>
                        <small>1d</small>
                    </div>

                </div>

                <a href="desafio.html" class="btn-participar">
                    Participar
                </a>

            </section>

        </main>

        <footer class="friends-footer">
            <a href="#" class="btn-criar">Criar desafio</a>
        </footer>

    </div>

</body>

</html>
