<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/beneficios.css">

    <title>Benefícios</title>
</head>

<body>

<div class="app-screen permission-page">

    <header class="permission-header">

        <div class="status-bar">
            <span>9:41</span>

            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <a href="../index.html" class="back-arrow" aria-label="Voltar para a home">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

    </header>

    <main class="permission-content">

        <img src="../assets/images/global/logos/carefitazul.png" class="permission-logo" alt="Care Fit">

        <p class="permission-subtitle">
            Chegou a solução completa<br>
            para o seu bem-estar.
        </p>

        <section class="benefits-list">

            <div class="benefit-card">
                <img src="../assets/images/global/cuidado.png" alt="Cuidado">
                <p>Torne o cuidado com a sua saúde mais leve e simples.</p>
            </div>

            <div class="benefit-card">
                <img src="../assets/images/global/medalha.png" alt="Medalha">
                <p>Conclua desafios diários com a sua família e amigos</p>
            </div>

            <div class="benefit-card">
                <img src="../assets/images/global/moeda.png" alt="Moeda">
                <p>Ganhe moedas para trocar por produtos e ganhar descontos</p>
            </div>

        </section>

    </main>

    <footer class="permission-footer">
        <a href="friends.html" class="access-btn">Acessar</a>
    </footer>

</div>

</body>
</html>
