<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/permissao.css">

    <title>Permissão</title>
</head>

<body>

<div class="app-screen permission-page">

    <!-- TOPO -->
    <header class="permission-header">

        <div class="status-bar">
            <span>9:41</span>

            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <!-- BOTÃO VOLTAR -->
        <a href="../index.html" class="back-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

    </header>

    <!-- CONTEÚDO -->
    <main class="permission-content">

        <div class="permission-icons">
            <img src="../assets/images/global/logos/iconazul.png" alt="Care Plus">

            <i class="fa-solid fa-plus"></i>

            <img src="../assets/images/global/apphealth.png" alt="App Saúde">
        </div>

        <h1>
            Conectar Care Plus<br>
            com aplicativo Saúde
        </h1>

        <p class="permission-description">
            Permita que o aplicativo Care Plus possa acessar os dados do aplicativo Saúde para que possamos trazer a melhor
            experiência em cuidado com o seu bem estar.
        </p>

        <p class="permission-terms">
            Ao aprovar você aceita nossos termos de compromisso.
            <br>
            <a href="#">Leia os termos</a>
        </p>

    </main>

    <!-- BOTÃO -->
    <footer class="permission-footer">
        <a href="friends.html" class="approve-btn">Aprovar</a>
        <div class="home-indicator"></div>
    </footer>

</div>

</body>
</html>
